<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dronacharya Mock Test - Identity Mode</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/3135/3135715.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --primary: #2563EB;
            --success: #059669;
            --danger: #DC2626;
            --bg: #F0F2F5;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; user-select: none; 
            font-family: 'Noto Serif Bengali', serif; 
            -webkit-tap-highlight-color: transparent; /* মোবাইলে ট্যাপ করলে নীল দাগ হবে না */
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: #1F2937;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* নাম ও নম্বর দেওয়ার স্ক্রিন */
        #auth-overlay {
            position: fixed; inset: 0; background: white; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; text-align: center;
        }

        .login-card {
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #4b5563; font-size: 14px; }
        
        .input-field {
            width: 100%; padding: 14px; border: 2px solid #e5e7eb;
            border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--primary); }

        .btn-start {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* কুইজ এরিয়া */
        #timer-bar {
            position: fixed; top: 0; width: 100%;
            background: #ffffff; color: #DC2626;
            text-align: center; padding: 12px;
            font-size: 18px; font-weight: bold;
            z-index: 1000; border-bottom: 2px solid #FDE68A;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header {
            margin-top: 50px; background: var(--primary); color: white;
            padding: 20px 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }

        .header img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; }
        .header h1 { font-size: 20px; }
        .header h3 {
            font-size: 14px; background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px; border-radius: 50px;
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 15px 10px 100px 10px; 
        }

        .question-card {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; border-left: 5px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .question-card p { font-size: 17px !important; line-height: 1.4; }

        .option {
            background: #F9FAFB; border: 1.5px solid #E5E7EB;
            border-radius: 10px; padding: 12px; margin: 10px 0;
            cursor: pointer; transition: 0.2s; font-size: 15px;
            word-wrap: break-word; /* লম্বা টেক্সট যাতে মোবাইল স্ক্রিনের বাইরে না যায় */
        }
        
        .option:active { background: #DBEAFE; transform: scale(0.98); } /* মোবাইলে ক্লিক ইফেক্ট */
        
        .option.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .option.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        #submit-btn {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; padding: 16px;
            background: #111827; color: white; border: none;
            border-radius: 12px; font-size: 18px; font-weight: bold;
            display: none; z-index: 100; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* রেজাল্ট ওভারলে */
        #result-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: none; align-items: center; justify-content: center; z-index: 6000;
            padding: 15px;
        }

        .result-box {
            background: white; padding: 25px 20px; border-radius: 20px;
            text-align: center; width: 100%; max-width: 380px;
        }

        .score-text { font-size: 40px; color: var(--primary); font-weight: 800; margin: 10px 0; }
        
        #feedback-msg { font-size: 16px; font-weight: bold; color: #475569; margin-bottom: 20px; }

        .result-btn {
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 14px; border-radius: 10px; margin: 5px 0; 
            cursor: pointer; font-size: 16px; font-weight: 700;
        }

        /* লোডিং টেক্সট */
        .loading { text-align: center; padding: 40px; color: #666; font-size: 16px; }

        @media (max-width: 480px) {
            .header h1 { font-size: 18px; }
            .score-text { font-size: 35px; }
            .question-card { padding: 12px; }
            .option { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body oncontextmenu="return false">

<!-- Auth Section -->
<div id="auth-overlay">
    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png" width="50">
        <h2 style="margin: 10px 0; font-size: 22px;">পরীক্ষার্থীর তথ্য</h2>
        <div class="input-group">
            <label>আপনার নাম:</label>
            <input type="text" id="user-name" class="input-field" placeholder="নাম লিখুন...">
        </div>
        <div class="input-group">
            <label>মোবাইল নম্বর:</label>
            <input type="tel" id="user-phone" class="input-field" placeholder="97XXXXXXXX" maxlength="10">
        </div>
        <button class="btn-start" onclick="startQuiz()">পরীক্ষা শুরু করুন</button>
    </div>
</div>

<!-- Sticky Timer -->
<div id="timer-bar">সময় বাকি: 30:00</div>

<!-- Header Area -->
<header class="header">
    <img src="https://drive.google.com/thumbnail?id=1fCf01Mr_bRA10Npc1TGWfEYxD0JX9Nh0&sz=w800" alt="Logo">
    <h1>দ্রোণাচার্য ডিফেন্স্ একাডেমী</h1>
    <h3>সিন্ধু সভ্যতা</h3>
</header>

<!-- Quiz Container -->
<div class="container" id="quiz-container"></div>

<!-- Mobile Submit Button -->
<button id="submit-btn" onclick="showResults()">পরীক্ষা জমা দিন</button>

<!-- Result Popup -->
<div id="result-overlay">
    <div class="result-box">
        <h2 style="color: #1e293b; font-size: 20px;">আপনার রেজাল্ট কার্ড</h2>
        <div class="score-text" id="final-score">0 / 0</div>
        <p id="feedback-msg"></p>
        <hr style="margin-bottom: 20px; opacity: 0.1;">
        <button class="result-btn" onclick="location.reload()">আবার পরীক্ষা দিন</button>
        <button class="result-btn" style="background:#64748b;" onclick="closeResult()">উত্তরগুলো দেখুন</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwroLVIn8zkcm0PqR3XBXvRV2ZmCxLO7YHHtUpyAAHZ1EWKG_WSCqmR0EClLqLUqLtnSg/exec";
    const GID = "1083138154"; 
    
    let userName = "", userPhone = "";
    let score = 0, totalQuestions = 0, timeLeft = 1800, timerInterval;

    function startQuiz() {
        userName = document.getElementById('user-name').value;
        userPhone = document.getElementById('user-phone').value;

        if(userName.trim().length < 2 || userPhone.trim().length < 10) {
            alert("দয়া করে সঠিক নাম এবং ১০ ডিজিটের মোবাইল নম্বর দিন!");
            return;
        }

        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        loadQuestions();
    }

    async function loadQuestions() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = "<div class='loading'>প্রশ্ন লোড হচ্ছে...</div>";
        
        const currentTestName = document.querySelector('.header h3').textContent.trim();
        
        try {
            const response = await fetch(`${scriptURL}?gid=${GID}`);
            const data = await response.text();
            
            const rows = data.trim().split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            
            const quizRows = rows.filter(row => {
                return row[0] && row[0].trim().replace(/"/g, "") === currentTestName;
            });

            if (quizRows.length === 0) {
                container.innerHTML = `<p style='text-align:center; color:red; padding:20px;'>দুঃখিত, "${currentTestName}" এর কোনো প্রশ্ন পাওয়া যায়নি।</p>`;
                return;
            }

            totalQuestions = quizRows.length;
            container.innerHTML = "";

            quizRows.forEach((row, index) => {
                if(!row[2]) return;
                
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = row[2].replace(/"/g, "");
                const opts = [row[3], row[4], row[5], row[6]].map(o => o ? o.replace(/"/g, "") : "");
                const correct = row[7] ? row[7].trim().replace(/"/g, "") : "";

                card.innerHTML = `<p style="font-weight:bold; margin-bottom:12px;">${index + 1}. ${qText}</p>`;

                opts.forEach(opt => {
                    if(!opt) return;
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = opt;
                    div.onclick = function() {
                        const all = card.querySelectorAll('.option');
                        all.forEach(o => o.style.pointerEvents = 'none');
                        
                        if(this.textContent.trim() === correct) {
                            this.classList.add('correct'); score++;
                        } else {
                            this.classList.add('wrong');
                            all.forEach(o => { if(o.textContent.trim() === correct) o.classList.add('correct'); });
                        }
                    };
                    card.appendChild(div);
                });
                container.appendChild(card);
            });
            startTimer();
        } catch(e) { 
            console.error(e);
            container.innerHTML = "<p style='text-align:center;'>ডাটা লোড করতে সমস্যা হয়েছে। নেটওয়ার্ক চেক করুন।</p>"; 
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-bar').textContent = `সময় বাকি: ${m}:${s<10?'0':''}${s}`;
            if(timeLeft-- <= 0) showResults();
        }, 1000);
    }

    function showResults() {
        clearInterval(timerInterval);
        document.getElementById('result-overlay').style.display = 'flex';
        document.getElementById('final-score').textContent = `${score} / ${totalQuestions}`;
        
        const testTitle = document.querySelector('.header h3').textContent;
        let msg = "";
        let percentage = (score / totalQuestions) * 100;

        if (percentage >= 80) msg = "অসাধারণ! 🌟 প্রস্তুতি চমৎকার।";
        else if (percentage >= 60) msg = "ভালো হয়েছে! 👍 আরও উন্নতি সম্ভব।";
        else if (percentage >= 40) msg = "গড়পড়তা রেজাল্ট। 📚 আরও পড়ুন।";
        else msg = "খুবই দুর্বল ফলাফল। ⚠️ আজই কঠোর পরিশ্রম শুরু করুন!";
        
        document.getElementById('feedback-msg').textContent = msg;

        const payload = {
            name: userName,
            phone: userPhone,
            testName: testTitle,
            score: score,
            total: totalQuestions
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(err => console.log('Sending error:', err));
    }

    function closeResult() {
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>

</body>
</html>
